<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDA Social Wall V2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: transparent; color: #fff; font-family: 'Outfit', sans-serif; margin: 0; padding: 10px; }
        .post-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; transition: 0.3s; }
        .post-card:hover { border-color: #38bdf8; }
        .admin-post { border: 1px solid rgba(56, 189, 248, 0.3); background: linear-gradient(to bottom right, rgba(56, 189, 248, 0.05), transparent); }
        .verified-badge { color: #38bdf8; font-size: 10px; margin-left: 4px; }
    </style>
</head>
<body>
    <div id="wall-container" class="space-y-4 pb-20">
        <div class="flex justify-center p-10"><i class="fas fa-circle-notch animate-spin text-sky-500 text-2xl"></i></div>
    </div>

    <div class="fixed bottom-4 left-4 right-4 flex gap-2">
        <input type="text" id="post-text" placeholder="Share with the network..." class="flex-1 bg-black/60 backdrop-blur-xl border border-white/10 p-4 rounded-2xl outline-none text-sm">
        <button onclick="publishPost()" class="bg-sky-500 px-6 rounded-2xl active:scale-90 transition-transform"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbycO3WbrAycpHFSCPWP2jTfZ_2_c8p47ugbgN1mg3JhcqHIsZaFd6jf9zBsTRP7eeuU/exec';
        const urlParams = new URLSearchParams(window.location.search);
        const viewerUid = urlParams.get('uid');
        const isAdmin = (viewerUid === 'RIDA-259259');

        async function loadWall() {
            try {
                const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getFeed' }) })).json();
                const container = document.getElementById('wall-container');
                container.innerHTML = res.data.map(p => {
                    const isSystem = p.username === 'ridaAdmin' || p.uid === 'RIDA-259259';
                    return `
                        <div class="post-card p-5 ${isSystem ? 'admin-post' : ''}">
                            <div class="flex justify-between items-start mb-2">
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-black tracking-tighter uppercase ${isSystem ? 'text-sky-400' : 'text-slate-400'}">
                                        ${p.username} ${isSystem ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}
                                    </span>
                                    <span class="text-[8px] text-slate-600">${new Date(p.timestamp).toLocaleDateString()}</span>
                                </div>
                                ${isAdmin ? `<i onclick="deleteMsg('${p.id}')" class="fas fa-trash-alt text-red-500/30 hover:text-red-500 cursor-pointer text-xs"></i>` : ''}
                            </div>
                            <p class="text-sm text-slate-200 leading-relaxed">${p.content}</p>
                            <div class="mt-4 flex gap-4 items-center border-t border-white/5 pt-3">
                                <button onclick="likePost('${p.id}')" class="text-[10px] font-bold text-slate-500 hover:text-pink-500 transition-colors">
                                    <i class="fas fa-heart mr-1"></i> ${p.likes || 0}
                                </button>
                                <span class="text-[10px] font-bold text-slate-500"><i class="fas fa-comment mr-1"></i> REPLY</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch(e) { console.error(e); }
        }

        async function publishPost() {
            const content = document.getElementById('post-text').value;
            if(!content) return;
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'createPost', uid: viewerUid, content: content }) });
            document.getElementById('post-text').value = '';
            loadWall();
        }

        async function likePost(postId) {
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'likePost', postId: postId, uid: viewerUid }) });
            loadWall();
        }

        async function deleteMsg(postId) {
            if(!confirm("Delete this post?")) return;
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'deletePost', postId: postId, adminUid: viewerUid }) });
            loadWall();
        }

        loadWall();
        setInterval(loadWall, 15000);
    </script>
</body>
</html>
