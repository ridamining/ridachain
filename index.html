<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rida Community Wall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        
        :root { --sky: #38bdf8; --indigo: #6366f1; }
        body { 
            background: transparent; /* Allows parent app background to show through */
            color: #fff; 
            font-family: 'Outfit', sans-serif; 
            margin: 0;
            padding: 0;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .post-card {
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-send {
            background: linear-gradient(135deg, var(--sky) 0%, var(--indigo) 100%);
        }

        /* Hide scrollbars but keep functionality */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4">

    <div class="glass p-5 rounded-[2.5rem] mb-8">
        <div class="flex items-center gap-3 mb-4">
            <div id="user-avatar" class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center font-black text-sm uppercase">?</div>
            <div>
                <p id="display-name" class="text-xs font-black uppercase tracking-widest text-sky-400">Guest Miner</p>
                <p class="text-[8px] opacity-40 font-bold uppercase">Public Protocol</p>
            </div>
        </div>
        <textarea id="post-text" placeholder="Share your mining milestones or RIDA news..." 
            class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-sky-500/50 transition h-24 resize-none"></textarea>
        <div class="flex justify-end mt-3">
            <button onclick="publishPost()" class="btn-send px-8 py-3 rounded-xl text-[10px] font-black tracking-widest uppercase shadow-lg shadow-sky-500/20 active:scale-95 transition">
                Post to Wall
            </button>
        </div>
    </div>

    <div class="flex items-center justify-between px-2 mb-6">
        <h2 class="text-lg font-black italic tracking-tighter uppercase">Community Feed</h2>
        <div onclick="loadFeed()" class="w-8 h-8 flex items-center justify-center rounded-full bg-white/5 cursor-pointer active:rotate-180 transition-all duration-500">
            <i class="fas fa-sync-alt text-[10px] text-sky-400"></i>
        </div>
    </div>

    <div id="feed-container" class="space-y-4">
        <div id="feed-loader" class="flex flex-col items-center py-20 opacity-20">
            <div class="w-8 h-8 border-2 border-t-sky-500 rounded-full animate-spin"></div>
            <p class="text-[8px] font-black tracking-[0.3em] mt-4 uppercase">Syncing Ledger</p>
        </div>
    </div>

    <script>
        const SOCIAL_API = "https://script.google.com/macros/s/AKfycbxjIBCavPwdL-F9ym4m0Oz77W-KgIY3JXQ1DcR2fl3HwfZDTT9SxoRARRRzWryEX6lGOQ/exec";
        
        // Retrieve identity from URL parameters passed by the main app
        const urlParams = new URLSearchParams(window.location.search);
        const currentUser = {
            uid: urlParams.get('uid') || "Guest-" + Math.floor(Math.random() * 999),
            username: urlParams.get('username') || "Anonymous"
        };

        // Initialize UI
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('display-name').innerText = currentUser.username;
            document.getElementById('user-avatar').innerText = currentUser.username.charAt(0);
            loadFeed();
        });

        async function loadFeed() {
            const container = document.getElementById('feed-container');
            
            try {
                const response = await fetch(SOCIAL_API, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getFeed' })
                });
                const result = await response.json();

                if (result.success) {
                    if (result.data.length === 0) {
                        container.innerHTML = `<div class="text-center py-20 opacity-20 text-[10px] font-black uppercase tracking-[0.2em]">The wall is empty...</div>`;
                        return;
                    }

                    container.innerHTML = result.data.map(post => `
                        <div class="glass p-5 rounded-[2rem] post-card">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center font-black text-[10px] uppercase border border-white/10 text-sky-400">
                                        ${post.username ? post.username.charAt(0) : '?'}
                                    </div>
                                    <div>
                                        <p class="text-[10px] font-black uppercase tracking-tight">${post.username}</p>
                                        <p class="text-[7px] opacity-30 font-bold">${formatDate(post.timestamp)}</p>
                                    </div>
                                </div>
                                <div class="text-[7px] font-black bg-sky-500/10 text-sky-400 px-2 py-1 rounded-md uppercase border border-sky-500/20">
                                    VERIFIED NODE
                                </div>
                            </div>
                            <p class="text-xs leading-relaxed text-slate-300 font-medium">
                                ${post.content}
                            </p>
                            <div class="mt-5 pt-4 border-t border-white/5 flex items-center gap-4">
                                <button onclick="likePost('${post.postId}')" class="text-[9px] font-black flex items-center gap-1.5 text-slate-500 hover:text-sky-400 transition">
                                    <i class="fas fa-heart"></i> ${post.likes || 0}
                                </button>
                                <div class="text-[9px] font-black text-slate-700 flex items-center gap-1.5">
                                    <i class="fas fa-fingerprint"></i> ${post.postId.split('-')[1]}
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                container.innerHTML = `<div class="text-center py-10 text-red-500 text-[9px] font-black">SYNC ERROR: CHECK CONNECTION</div>`;
            }
        }

        async function publishPost() {
            const btn = event.target;
            const text = document.getElementById('post-text').value;

            if (!text.trim()) return;

            btn.disabled = true;
            btn.innerText = "PUBLISHING...";

            try {
                const response = await fetch(SOCIAL_API, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'createPost',
                        uid: currentUser.uid,
                        username: currentUser.username,
                        content: text
                    })
                });
                const result = await response.json();

                if (result.success) {
                    document.getElementById('post-text').value = '';
                    loadFeed();
                }
            } catch (err) {
                alert("Protocol Error: Unable to post.");
            } finally {
                btn.disabled = false;
                btn.innerText = "POST TO WALL";
            }
        }

        async function likePost(postId) {
            // Heart animation effect could be added here
            await fetch(SOCIAL_API, {
                method: 'POST',
                body: JSON.stringify({ action: 'likePost', postId: postId })
            });
            loadFeed();
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }
    </script>
</body>
</html>
