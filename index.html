<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rida Social Wall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        body { background: #020617; color: white; font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .post-card { transition: transform 0.2s; }
        .post-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-20">

    <header class="sticky top-0 z-50 glass p-6 flex justify-between items-center">
        <h1 class="text-2xl font-black italic">COMMUNITY<span class="text-sky-400">.</span></h1>
        <div id="user-display" class="text-[10px] font-bold bg-sky-500/10 px-3 py-1 rounded-full border border-sky-500/30">---</div>
    </header>

    <div class="p-6">
        <div class="glass p-4 rounded-3xl space-y-3">
            <textarea id="post-content" placeholder="Share your mining progress..." class="w-full bg-transparent outline-none text-sm h-20 resize-none" maxlength="280"></textarea>
            <div class="flex justify-between items-center">
                <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Global Feed</span>
                <button onclick="publishPost()" class="bg-sky-500 hover:bg-sky-400 text-white px-6 py-2 rounded-xl text-xs font-black transition">POST</button>
            </div>
        </div>
    </div>

    <div id="feed" class="px-6 space-y-4">
        </div>

    <script>
        // REPLACE WITH YOUR SOCIAL API URL
        const SOCIAL_API = "https://script.google.com/macros/s/AKfycbxtuoY1jUvuEIqvAyR3k9rfRnGhLvBfZyawvuNPvPpEvUlsPnqS-OsNgbpy8XrjF-LVOQ/exec";
        
        // Auto-detect user from URL params
        const params = new URLSearchParams(window.location.search);
        const user = {
            uid: params.get('uid') || "Guest",
            username: params.get('username') || "Anonymous"
        };

        window.onload = () => {
            document.getElementById('user-display').innerText = user.username.toUpperCase();
            loadFeed();
        };

        async function loadFeed() {
            const res = await (await fetch(SOCIAL_API, { method: 'POST', body: JSON.stringify({ action: 'getFeed' }) })).json();
            const feed = document.getElementById('feed');
            feed.innerHTML = res.data.map(p => `
                <div class="glass p-5 rounded-[2rem] post-card">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-sky-400 to-indigo-600 flex items-center justify-center font-black text-xs">
                            ${p.username.charAt(0)}
                        </div>
                        <div>
                            <p class="text-xs font-black uppercase tracking-tighter">${p.username}</p>
                            <p class="text-[8px] opacity-40 font-bold">${new Date(p.timestamp).toLocaleDateString()}</p>
                        </div>
                    </div>
                    <p class="text-sm text-slate-200 leading-relaxed mb-4">${p.content}</p>
                    <div class="flex gap-4 border-t border-white/5 pt-3">
                        <button onclick="likePost('${p.postId}')" class="text-[10px] font-black text-slate-400 flex items-center gap-2">
                            <i class="far fa-heart text-sky-400"></i> ${p.likes}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function publishPost() {
            const content = document.getElementById('post-content').value;
            if(!content) return;
            await fetch(SOCIAL_API, { method: 'POST', body: JSON.stringify({ 
                action: 'createPost', uid: user.uid, username: user.username, content: content 
            }) });
            document.getElementById('post-content').value = '';
            loadFeed();
        }

        async function likePost(id) {
            await fetch(SOCIAL_API, { method: 'POST', body: JSON.stringify({ action: 'likePost', postId: id }) });
            loadFeed();
        }
    </script>
</body>
</html>
